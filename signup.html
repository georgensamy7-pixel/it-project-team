<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - CS Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Create Account</h2>
        <form id="signupForm">
            <input type="text" id="fName" placeholder="Name">
            <div id="fNameError" class="error-msg">Name must be at least 3 letters.</div>

            <input type="email" id="email" placeholder="Email Address">
            <div id="emailError" class="error-msg">Please enter a valid email.</div>

            <input type="password" id="pass" placeholder="Password">
            <div id="passError" class="error-msg">Password must be 6+ characters.</div>
<br>
<div id="successMsg" style="color: #4BB543; margin-top: 10px; display: none; font-weight: bold;"></div>
<br>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <p style="font-size: 14px; margin-top: 15px;">Already have an account? <a href="login.html" style="color: var(--accent-color);">Log In</a></p>
    </div>

    <script src="signup.js"></script>
</body>
</html>
